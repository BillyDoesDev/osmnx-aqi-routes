<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>folium and stuff</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <script defer src="/static/js/index.js"></script>
</head>

<body>

    <form id="route-form" action="/route" method="get">
        <div class="field">
            <label for="start">FROM</label>
            <input id="start" name="start" type="text" placeholder="e.g. Patia Square" value="{{ start | default('') }}"
                autocomplete="off" required />
            <div class="autocomplete-wrap">
                <ul class="suggestions" id="start-suggestions"></ul>
            </div>
        </div>
        <div class="field">
            <label for="end">TO</label>
            <input id="end" name="end" type="text" placeholder="e.g. Kalinga Hospital" value="{{ end | default('') }}"
                autocomplete="off" required />
            <div class="autocomplete-wrap">
                <ul class="suggestions" id="end-suggestions"></ul>
            </div>
        </div>
        <button type="submit" id="go-btn">
            <span>Find Route</span>
        </button>
    </form>

    <div class="map-container">
        {{ map_html | safe }}
    </div>

</body>

</html>
